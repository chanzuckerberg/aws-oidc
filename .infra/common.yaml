###### Generated using `argus bootstrap` command ######
stack:
  global:
    replicaCount: 1
    autoscaling:
      enabled: false
    service:
      port: 8080
    nodeSelector:
      kubernetes.io/arch: arm64

  services:
    aws-oidc:
      image:
        repository: 533267185808.dkr.ecr.us-west-2.amazonaws.com/core-platform/aws-oidc/aws-oidc
      # The server reads the rolemap ConfigMap via the Kubernetes API on each request,
      # so it needs its own service account (granted read access by templates/rbac.yaml).
      serviceAccount:
        create: true
        name: aws-oidc
      resources:
        limits:
          cpu: 300m
          memory: 500Mi
        requests:
          cpu: 300m
          memory: 500Mi
      args:
        - serve-config
        - -v
      ingress:
        paths:
          - path: /
            pathType: Prefix
      livenessProbe:
        httpGet:
          path: /health
      readinessProbe:
        httpGet:
          path: /health
      env:
        - name: OKTA_CLIENT_ID
          value: 0oa1be0s0d6KhEAed1t8
        - name: OKTA_ISSUER_URL
          value: https://czi.okta.com
        - name: OKTA_SERVICE_CLIENT_ID
          value: 0oa18b7m1cb97rFLK1t8
